<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP & Three.js</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <section class="stage puzzle-stage active" id="puzzleStage">
      <div class="bg-orb orb-a"></div>
      <div class="bg-orb orb-b"></div>
      <div class="spark spark-a"></div>
      <div class="spark spark-b"></div>

      <header class="hero">
        <p class="subtext">
          GPT改了去年的彩蛋项目用于gsap动效展示<br />
          gsap作为动画库极大程度减少手搓css动画的难度与时间
        </p>
      </header>

      <div class="grid-wrap">
        <div class="gift-grid" id="giftGrid" aria-label="gift grid"></div>
      </div>

      
    </section>

    <section class="stage reveal-stage" id="revealStage" aria-hidden="true">
      <div class="three-backdrop"></div>
      <div id="threeCanvas"></div>

      <div class="overlay-panel">
        <h2>three.js</h2>
        <p class="overlay-copy">
  最简单的 3D 旋转物体演示，three.js库应该是在网页中加入3维元素最简单的方法,一个成熟的前端项目必然包含现有库的使用<br />
  <span class="morse-hint">
    --.- --.- / ..-. .- / ... --- -. --. / .---- / .-.. .. -. --. / --.- ..- / .--- ..- / -..- ..- . / .-.. ..
  </span>
</p>

        <div class="message-card" id="messageCard">
          <span class="message-tag">but一码归一码</span>
          <p class="message-main">生日快乐 🎂</p>
        </div>

        <div class="action-row">
          <button id="musicBtn" class="ghost-btn" type="button">▶ 播放生日歌</button>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
